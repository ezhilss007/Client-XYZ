trigger:
- main

pool:
  name: TerraformTraining   # your self-hosted agent

variables:
  workingDir: '$(Build.SourcesDirectory)\Client-XYZ'
  terraformVersion: '1.5.7'
  serviceConnection: 'TerraformTraining'

resources:
  repositories:
  - repository: TerraformModules
    type: github
    endpoint: ezhilss007   # service connection to GitHub
    name: ezhilss007/TerraformModules
    ref: feature/Modules

stages:

# =========================
# PLAN STAGE
# =========================
- stage: Plan
  displayName: Terraform Plan

  jobs:
  - job: PlanJob
    steps:

    # Checkout both repos
    - checkout: self
    - checkout: TerraformModules

    # Install Terraform (manual - no marketplace dependency)
    - task: PowerShell@2
      displayName: Install Terraform
      inputs:
        targetType: inline
        script: |
          $version = "$(terraformVersion)"
          $url = "https://releases.hashicorp.com/terraform/$version/terraform_${version}_windows_amd64.zip"
          $zip = "$env:TEMP\terraform.zip"
          $dest = "C:\terraform"

          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force

          echo "##vso[task.prependpath]$dest"

    # Verify installation
    - script: terraform -version
      displayName: Verify Terraform

    # Terraform INIT
    - task: AzureCLI@2
      displayName: Terraform Init
      inputs:
        azureSubscription: '$(serviceConnection)'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          cd "$(workingDir)"
          terraform init

    # Terraform PLAN
    - task: AzureCLI@2
      displayName: Terraform Plan
      inputs:
        azureSubscription: '$(serviceConnection)'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          cd "$(workingDir)"
          terraform plan -out=tfplan

    # Publish plan artifact
    - publish: $(workingDir)\tfplan
      artifact: tfplan

# =========================
# APPLY STAGE (WITH APPROVAL)
# =========================
- stage: Apply
  displayName: Terraform Apply
  dependsOn: Plan

  jobs:
  - deployment: ApplyJob
    displayName: Apply with Approval
    environment: prod-approval   # 👈 configure approval in DevOps UI

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
          - checkout: TerraformModules

          - download: current
            artifact: tfplan

          # Install Terraform again (fresh agent step)
          - task: PowerShell@2
            displayName: Install Terraform
            inputs:
              targetType: inline
              script: |
                $version = "$(terraformVersion)"
                $url = "https://releases.hashicorp.com/terraform/$version/terraform_${version}_windows_amd64.zip"
                $zip = "$env:TEMP\terraform.zip"
                $dest = "C:\terraform"

                Invoke-WebRequest -Uri $url -OutFile $zip
                Expand-Archive -Path $zip -DestinationPath $dest -Force

                echo "##vso[task.prependpath]$dest"

          - script: terraform -version
            displayName: Verify Terraform

          # Terraform INIT
          - task: AzureCLI@2
            displayName: Terraform Init
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                cd "$(workingDir)"
                terraform init

          # Terraform APPLY
          - task: AzureCLI@2
            displayName: Terraform Apply
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                cd "$(workingDir)"
                terraform apply tfplan
